# ═══════════════════════════════════════════════════════════
# Schema-Aware Transformation Service — Default Configuration
# ═══════════════════════════════════════════════════════════

sats:
  schema:
    cache-ttl: 5m
    registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
    rescue-threshold-percent: 50

  batch:
    byte-target: 128MB
    max-records: 50000
    max-timer: 60s
    timer-check-interval-ms: 5000

  threading:
    write-pool-size: 8
    write-queue-capacity: 16
    carrier-pool-size: 0          # 0 = auto (availableProcessors)

  writer:
    merge-schema: true

  retry:
    max-attempts: 5
    initial-backoff: 1s
    backoff-multiplier: 2.0

  dlq:
    topic: ${DLQ_TOPIC:sats-dlq}

  raw-store:
    enabled: true
    flush-interval-ms: 10000   # how often to flush the in-memory buffer to Delta

  spark:
    token-refresh-percent: 80           # Rotate session at this % of tokenTtl
    token-ttl: ${SPARK_TOKEN_TTL:1h}    # Lifetime of the cluster PAT / OAuth token
    master: ${SPARK_MASTER:local[*]}    # local[*] for dev; spark:// or yarn in prod
    app-name: sats
    output-base-path: ${SPARK_OUTPUT_BASE_PATH:/tmp/sats}  # dataset written to {base}/{datasetId}

  consumer:
    topic-registry-url: ${TOPIC_REGISTRY_URL:http://localhost:8080/api/topics}
    group-id: sats-consumer-group
    # Topic groups control how topics are distributed across listener containers.
    # Topics in the same group share one poll loop; different groups run independently.
    #
    # Each topic descriptor has:
    #   name        : Kafka topic name (cross-referenced against the broker registry)
    #   type        : DATA_RECORD | DATA_LOAD | PLAIN_TEXT
    #   dataset-id  : required for PLAIN_TEXT; ignored for DATA_RECORD / DATA_LOAD
    #                 (dataset ID is embedded in the Protobuf envelope for those types)
    topic-groups:
      - topics:                              # similar volume — share a poll loop
          - name: orders
            type: DATA_RECORD
          - name: payments
            type: DATA_RECORD
        concurrency: 2

      - topics:                              # bulk-load topic — carries batchLoadId
          - name: bulk-import
            type: DATA_LOAD
        concurrency: 1

      - topics:                              # low volume plain-text — dataset defined here
          - name: audit-log
            type: PLAIN_TEXT
            dataset-id: audit-dataset
        concurrency: 1

      - topics:                              # high volume plain-text — isolated + scaled out
          - name: clickstream
            type: PLAIN_TEXT
            dataset-id: clickstream-dataset
        concurrency: 4

# ─── Spring Kafka defaults ────────────────────────────────
spring:
  application:
    name: sats
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500

# ─── Actuator & Metrics ──────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: sats
